[package]
name = "abp-sidecar-sdk"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
readme = "README.md"
description = "Shared sidecar registration helpers for vendor SDK microcrates in the Agent Backplane"
keywords = ["agent", "backplane", "sidecar", "sdk", "registration"]
categories = ["development-tools"]

[dependencies]
abp-core = { path = "../abp-core", version = "0.1.0" }
abp-error = { path = "../abp-error", version = "0.1.0" }
abp-host = { path = "../abp-host", version = "0.1.0" }
abp-integrations = { path = "../abp-integrations", version = "0.1.0" }
abp-protocol = { path = "../abp-protocol", version = "0.1.0" }
abp-runtime = { path = "../abp-runtime", version = "0.1.0" }
anyhow.workspace = true
chrono.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["io-util", "io-std", "sync", "macros", "rt"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "io-util"] }
serde_json.workspace = true
