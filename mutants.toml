# cargo-mutants configuration for Agent Backplane
# Run with: cargo mutants --no-shuffle

# ── Timeout per mutation ─────────────────────────────────────────────────
timeout = 120          # seconds; allow headroom for slower crates
minimum_test_timeout = 20  # seconds; floor for fast tests

# ── Build-time limit ─────────────────────────────────────────────────────
build_timeout = 300    # seconds; cap incremental rebuild time

# ── Focus on the core, deterministic crates ──────────────────────────────
examine_re = [
  "^crates/abp-core/",
  "^crates/abp-protocol/",
  "^crates/abp-glob/",
  "^crates/abp-policy/",
  "^crates/abp-workspace/",
  "^crates/abp-capability/",
  "^crates/abp-error/",
  "^crates/abp-error-taxonomy/",
  "^crates/abp-receipt/",
  "^crates/abp-receipt-store/",
  "^crates/abp-mapping/",
  "^crates/abp-mapper/",
  "^crates/abp-config/",
  "^crates/abp-emulation/",
  "^crates/abp-telemetry/",
  "^crates/abp-dialect/",
  "^crates/abp-ir/",
  "^crates/abp-validate/",
  "^crates/abp-stream/",
  "^crates/abp-ratelimit/",
  "^crates/abp-retry/",
  "^crates/abp-projection/",
  "^crates/abp-backend-core/",
  "^crates/abp-sdk-types/",
  "^crates/abp-sidecar-proto/",
]

# ── Critical source files — highest mutation-testing priority ─────────────
# Receipt hashing — hash computation must be exact
# examine_re already covers these, but these files are the most important:
#   crates/abp-receipt/src/lib.rs          (canonicalize, compute_hash, verify_hash)
#   crates/abp-receipt/src/builder.rs      (with_hash)
#   crates/abp-core/src/lib.rs             (CONTRACT_VERSION, Outcome, ExecutionMode)
#   crates/abp-policy/src/lib.rs           (PolicyEngine: can_use_tool, can_read_path, can_write_path)
#   crates/abp-policy/src/compose.rs       (ComposedEngine: check_tool, check_read, check_write)
#   crates/abp-capability/src/lib.rs       (negotiate_capabilities, check_capability)
#   crates/abp-capability/src/negotiate.rs (apply_policy, NegotiationPolicy)
#   crates/abp-error/src/lib.rs            (ErrorCode::category, is_retryable, as_str)
#   crates/abp-dialect/src/detect.rs       (detect_dialect, score_fingerprint)
#   crates/abp-glob/src/lib.rs             (IncludeExcludeGlobs::decide_path, MatchDecision::is_allowed)
#   crates/abp-ir/src/normalize.rs         (normalize_role, dedup_system, trim_text, strip_empty)

# ── Skip test modules, fuzz harnesses, and xtask helpers ─────────────────
exclude_re = [
  "#\\[cfg\\(test\\)]",    # inline test modules
  "^tests/",               # integration tests (not SUT)
  "^fuzz/",                # fuzz harnesses
  "^xtask/",               # build tooling
  "/tests\\.rs$",          # test files inside crates
  "_test\\.rs$",           # files named *_test.rs
]
