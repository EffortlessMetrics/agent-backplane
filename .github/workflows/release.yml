name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  validate:
    name: Validate release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      # xtask release-check validates metadata, READMEs, version consistency,
      # and file inclusion (cargo package --list). A full `cargo publish --dry-run`
      # cannot work until all workspace deps exist on crates.io, so we rely on
      # metadata checks here and let the real publish handle dep ordering.
      - name: Validate release metadata and package manifests
        run: cargo run -p xtask -- release-check
