name: CI

on:
  push:
    branches: [main, "split/*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Gate (lint + compile)
        run: cargo run -p xtask -- gate --check

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --all-features

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --workspace --no-deps

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    env:
      CARGO_BUILD_JOBS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version 0.32.7 --locked

      - name: Run coverage
        run: >-
          cargo tarpaulin --config tarpaulin.toml --lib
          --packages abp-core abp-protocol abp-host abp-runtime
          abp-policy abp-glob abp-workspace abp-capability
          abp-ir abp-mapper abp-dialect abp-receipt
          abp-config abp-error abp-backend-core abp-backend-mock
          abp-stream abp-ratelimit abp-retry abp-validate
        timeout-minutes: 30

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/tarpaulin/
          if-no-files-found: ignore

      - name: Upload to Codecov
        if: ${{ always() && github.event_name == 'push' && hashFiles('target/tarpaulin/lcov.info') != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: target/tarpaulin/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

  schema:
    name: Schema Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Generate schemas
        run: cargo run -p xtask -- schema

      - name: Verify schemas are non-empty
        run: |
          count=$(find contracts/schemas -type f | wc -l)
          echo "Found $count schema files"
          if [ "$count" -eq 0 ]; then
            echo "::error::No schema files generated in contracts/schemas/"
            exit 1
          fi

      - name: Check for schema drift
        run: |
          if ! git diff --exit-code -- contracts/schemas; then
            echo "::error::Schema drift detected! Regenerate with: cargo run -p xtask -- schema"
            exit 1
          fi
